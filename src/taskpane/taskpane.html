<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>L21s Add-in</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>

    <!-- Template styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-font-m ms-welcome ms-Fabric">
    <!-- TODO2: Update the header node. -->
    <header class="ms-welcome__header ms-bgColor-neutralLighter">
        <img width="90" height="90" src="../../assets/logo-filled.png" alt="L21s" title="L21s" />
        <h1 class="ms-font-su">L21s Add-In</h1>
    </header>
    <section id="display-msg" class="ms-welcome__main">
        <div class="padding">
            <h3 class="ms-font-l">Sticker</h3>
            <div>
                Autor
                <input type="text" id="initials" />
                <button class="save-button" id="save-initials">Save</button>
            </div>
            <button class="sticker-yellow" id="yellow-sticker"></button>
            <button class="sticker-cyan" id="cyan-sticker"></button>

            <h3 class="ms-font-l">Background</h3>
            <div class="content">
                <div>
                    <input style="height: 36px" type="color" id="background-color" name="head" value="#FFFFFF" />
                    <button class="edit-grid-button" id="fill-background">
                        <img src="../../assets/fill-element.svg" alt="add-vertical-grid">
                    </button>
                </div>
            </div>

            <h3 class="ms-font-l">Rows</h3>
            <div class="content">
                <div>
                    <button class="edit-grid-button" id="add-horizontal-grid">
                        <img src="../../assets/add-horizontal-grid.svg" alt="add-vertical-grid">
                    </button>
                    <button class="edit-grid-button" id="remove-horizontal-grid">
                        <img src="../../assets/remove-horizontal-grid.svg" alt="remove-vertical-grid">
                    </button>
                    <button class="edit-grid-button" id="remove-all-horizontal-grids">
                        <img src="../../assets/trash.svg" alt="remove-all-horizontal-grids">
                    </button>
                </div>
            </div>

            <h3 class="ms-font-l">Columns</h3>
            <div class="content">
                <div>
                    <button class="edit-grid-button" id="add-vertical-grid">
                        <img src="../../assets/add-vertical-grid.svg" alt="add-vertical-grid">
                    </button>
                    <button class="edit-grid-button" id="remove-vertical-grid">
                        <img src="../../assets/remove-vertical-grid.svg" alt="remove-vertical-grid">
                    </button>
                    <button class="edit-grid-button" id="remove-all-vertical-grids">
                        <img src="../../assets/trash.svg" alt="remove-all-vertical-grids">
                    </button>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
